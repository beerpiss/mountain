env:
  node: true
  es2021: true
extends:
  - airbnb-typescript/base
  - plugin:import/recommended
parser: '@typescript-eslint/parser'
parserOptions:
  ecmaVersion: latest
  sourceType: module
  project: ./tsconfig.json
plugins:
  - '@typescript-eslint'
rules:
  '@typescript-eslint/no-unused-vars':
  - error
  - argsIgnorePattern: '^_'
    varsIgnorePattern: '^_'
  import/no-unresolved: off
  no-unused-vars: off
